{% extends "base.html" %} 
{% block content %}

<h1 class="text-3xl font-bold mb-6">Predict Employee Attrition</h1>

<div class="bg-white p-8 rounded-2xl shadow-lg max-w-2xl">

  <form action="/predict" method="POST" class="space-y-5">

    <!-- Age -->
    <div>
      <label class="block font-medium mb-1">Age</label>
      <input 
        type="number" 
        name="Age" 
        placeholder="e.g. 25"
        min="18"
        max="65"
        required
        class="w-full border rounded-lg p-3 focus:ring-2 focus:ring-blue-500 outline-none"
      />
    </div>

    <!-- Monthly Income -->
    <div>
      <label class="block font-medium mb-1">Monthly Income</label>
      <input
        type="number"
        name="MonthlyIncome"
        placeholder="e.g. 5000"
        min="0"
        required
        class="w-full border rounded-lg p-3 focus:ring-2 focus:ring-blue-500 outline-none"
      />
    </div>

    <!-- Job Level -->
    <div>
      <label class="block font-medium mb-1">Job Level</label>
      <select 
        name="JobLevel" 
        required
        class="w-full border rounded-lg p-3 focus:ring-2 focus:ring-blue-500 outline-none"
      >
        <option value="">-- Select Job Level --</option>
        <option value="1">Level 1</option>
        <option value="2">Level 2</option>
        <option value="3">Level 3</option>
        <option value="4">Level 4</option>
      </select>
    </div>

    <!-- Years At Company -->
    <div>
      <label class="block font-medium mb-1">Years At Company</label>
      <input
        type="number"
        name="YearsAtCompany"
        placeholder="e.g. 2"
        min="0"
        required
        class="w-full border rounded-lg p-3 focus:ring-2 focus:ring-blue-500 outline-none"
      />
    </div>

    <!-- Button -->
    <button
      type="submit"
      class="w-full bg-blue-600 text-white py-3 rounded-lg font-semibold hover:bg-blue-700 transition duration-200"
    >
      Predict Now
    </button>

  </form>

  {% if prediction %}

    {% if "Yes" in prediction or "Resign" in prediction %}
    <div class="mt-6 p-4 rounded-lg bg-red-100 text-red-700 font-semibold">
      ⚠️ {{ prediction }}
    </div>
    {% else %}
    <div class="mt-6 p-4 rounded-lg bg-green-100 text-green-700 font-semibold">
      ✅ {{ prediction }}
    </div>
    {% endif %}

  {% endif %}

</div>

{% endblock %}
